<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Subscription Manager Chatbot</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        .app-container {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 300px 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Sidebar Styling */
        .sidebar {
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid var(--glass-border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
            color: #10b981;
        }

        /* Chat Area Styling */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #10b981;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: messageFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
        }

        .bot .message-bubble {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .user .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .action-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
            text-align: left;
        }

        .action-chip:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .input-area {
            padding: 24px 32px;
            background: rgba(0, 0, 0, 0.1);
            border-top: 1px solid var(--glass-border);
        }

        .input-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            padding: 8px;
            outline: none;
        }

        .send-button {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .send-button:hover { background: var(--primary-hover); transform: scale(1.05); }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .app-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div style="background: var(--primary); padding: 8px; border-radius: 10px;">💰</div>
                <div>
                    <h3 style="font-size: 16px;">Manager</h3>
                    <p style="font-size: 11px; color: var(--text-dim);">AI Subscriptions</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Monthly Spending</div>
                <div class="stat-value">$142.50</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Potential Savings</div>
                <div class="stat-value" style="color: #60a5fa;">$32.10</div>
            </div>

            <div style="margin-top: auto;">
                <p style="font-size: 12px; color: var(--text-dim);">Last synced: Just now</p>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <h2 style="font-size: 18px;">AI Assistant</h2>
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        Ready to help
                    </div>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer"></div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="How can I save money today?">
                    <button class="send-button" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('messagesContainer');
        const input = document.getElementById('messageInput');

        function addMessage(role, text, actions = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            msgDiv.appendChild(bubble);

            if (actions.length > 0) {
                const grid = document.createElement('div');
                grid.className = 'actions-grid';
                actions.forEach(a => {
                    const chip = document.createElement('button');
                    chip.className = 'action-chip';
                    chip.textContent = a.label;
                    chip.onclick = () => a.url ? window.open(a.url, '_blank') : handleInternalAction(a.action);
                    grid.appendChild(chip);
                });
                msgDiv.appendChild(grid);
            }

            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const val = input.value.trim();
            if (!val) return;
            
            addMessage('user', val);
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                addMessage('bot', data.text, data.actions);
            } catch (e) {
                addMessage('bot', '⚠️ Connection error. Is the server running?');
            }
        }

        function handleInternalAction(action) {
            // Placeholder for internal state changes
            input.value = action.replace(/_/g, ' ');
            sendMessage();
        }

        input.onkeypress = (e) => e.key === 'Enter' && sendMessage();

        // Initial greeting
        window.onload = () => {
            addMessage('bot', 'Welcome back! ⚡\n\nI’ve analyzed your subscriptions and found **$32.10** in potential savings this month. \n\nWould you like to review them or search for something new?', [
                { label: 'Review Savings', action: 'find_better_deal' },
                { label: 'Cancel a Service', action: 'cancel_service' },
                { label: 'New Search', action: 'search' }
            ]);
        };
    </script>
</body>
</html>
